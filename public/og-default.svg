<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f14;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a24;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#818cf8;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Subtle grid lines -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#ffffff08" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#ffffff08" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="#ffffff08" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="#ffffff08" stroke-width="1"/>

  <!-- Accent bar -->
  <rect x="80" y="260" width="6" height="110" fill="url(#accent)" rx="3"/>

  <!-- Logo / wordmark -->
  <text x="104" y="240" font-family="system-ui,-apple-system,sans-serif" font-size="22" font-weight="600" letter-spacing="0.12em" fill="#6366f1" text-transform="uppercase">STRATALYX</text>

  <!-- Main headline -->
  <text x="104" y="310" font-family="system-ui,-apple-system,sans-serif" font-size="58" font-weight="800" fill="#f8fafc">AI-Powered</text>
  <text x="104" y="378" font-family="system-ui,-apple-system,sans-serif" font-size="58" font-weight="800" fill="#f8fafc">Investment Analysis</text>

  <!-- Subtitle -->
  <text x="104" y="430" font-family="system-ui,-apple-system,sans-serif" font-size="24" fill="#94a3b8">Apply legendary investor frameworks to any stock</text>

  <!-- Investor pills -->
  <rect x="104" y="470" width="140" height="36" rx="18" fill="#6366f120" stroke="#6366f140" stroke-width="1"/>
  <text x="174" y="493" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="600" fill="#818cf8" text-anchor="middle">Buffett</text>

  <rect x="256" y="470" width="140" height="36" rx="18" fill="#6366f120" stroke="#6366f140" stroke-width="1"/>
  <text x="326" y="493" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="600" fill="#818cf8" text-anchor="middle">Graham</text>

  <rect x="408" y="470" width="140" height="36" rx="18" fill="#6366f120" stroke="#6366f140" stroke-width="1"/>
  <text x="478" y="493" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="600" fill="#818cf8" text-anchor="middle">Lynch</text>

  <rect x="560" y="470" width="140" height="36" rx="18" fill="#6366f120" stroke="#6366f140" stroke-width="1"/>
  <text x="630" y="493" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="600" fill="#818cf8" text-anchor="middle">Dalio</text>

  <rect x="712" y="470" width="140" height="36" rx="18" fill="#6366f120" stroke="#6366f140" stroke-width="1"/>
  <text x="782" y="493" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="600" fill="#818cf8" text-anchor="middle">+ more</text>

  <!-- Disclaimer -->
  <text x="104" y="580" font-family="system-ui,-apple-system,sans-serif" font-size="14" fill="#475569">Educational use only. Not investment advice.</text>

  <!-- Right side decorative chart -->
  <polyline points="900,400 940,360 980,380 1020,300 1060,320 1100,260" fill="none" stroke="#6366f1" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
  <polyline points="900,420 940,390 980,410 1020,340 1060,355 1100,300" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.4"/>
</svg>
